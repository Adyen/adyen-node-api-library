# Workflow to publish a new release on NPM
# https://www.npmjs.com/package/@adyen/api-library
name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish --dry-run instead of publishing to NPM'
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # Required for OpenID Connect (OIDC) for trusted publishing on NPM

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build package
        run: npm run build
      - name: Run tests
        run: npm run test
      - name: Upload build artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: build-output
          path: lib/
          retention-days: 1

  publish-npm:
    runs-on: ubuntu-latest
    needs: build
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true
      - name: Download build artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: build-output
          path: lib/
      - name: Publish to NPM
        if: ${{ !fromJSON(inputs.dry-run || 'false') }}
        run: npm publish
      - name: Dry run (verify publish without uploading)
        if: ${{ fromJSON(inputs.dry-run || 'false') }}
        run: npm publish --dry-run
