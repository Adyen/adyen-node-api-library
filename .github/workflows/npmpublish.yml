# Workflow to publish a new release on NPM
# https://www.npmjs.com/package/@adyen/api-library
name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish --dry-run instead of publishing to NPM'
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # Required for OpenID Connect (OIDC) for trusted publishing on NPM

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build package
        run: npm run build
      - name: Run tests
        run: npm run test
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: lib/
          retention-days: 1

  publish-npm:
    runs-on: ubuntu-latest
    needs: build
    environment: release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: lib/
      - name: Publish to NPM
        if: ${{ !fromJSON(inputs.dry-run || 'false') }}
        run: npm publish
      - name: Dry run (verify publish without uploading)
        if: ${{ fromJSON(inputs.dry-run || 'false') }}
        run: npm publish --dry-run
